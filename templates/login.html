<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Running Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center;
               align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .box { background: white; padding: 40px; border-radius: 12px;
               box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .runner { font-size: 64px; cursor: pointer; display: block; margin-bottom: 8px; }
        h2 { color: #e05c00; margin-bottom: 24px; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc;
                border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn { background: #e05c00; color: white; padding: 12px 30px; border: none;
               border-radius: 6px; cursor: pointer; font-size: 15px;
               margin-top: 16px; width: 100%; }
        .btn:hover { background: #c44f00; }
        .error { color: red; margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <span class="runner">🏃</span>
        <h2>Running Tracker</h2>
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button class="btn" type="submit">Login</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
